<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Boss — Backtest Reveal</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden}#root{position:fixed;inset:0}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const GOLD='#c8a96e', GREEN='#00e5a0', RED='#ff4560';
const BG='#050810', SURF='#0b1220', MID='#b8cccc', TEXT='#eaeeee';
const MONO='IBM Plex Mono, monospace', UI='DM Sans, system-ui, sans-serif';

// Equity curve — upward trending with realistic drawdowns
const PATH="M 0 370 L 80 362 L 160 355 L 240 348 L 310 358 L 380 340 L 460 325 L 540 330 L 610 310 L 690 288 L 760 295 L 830 272 L 900 256 L 960 268 L 1020 240 L 1090 212 L 1140 220 L 1180 192 L 1200 168";

// Opening hero — "4 Markets. 8 Instruments. One Edge."
function Hero(){
  const t=useTime();
  // Fade in
  const eyeP=clamp((t-0.3)/0.5,0,1);
  const titleP=clamp((t-0.8)/0.7,0,1);
  const titleEase=Easing.easeOutBack(titleP);
  const subP=clamp((t-1.8)/0.6,0,1);
  // Fade out starting at 4.5s
  const fadeOut=clamp((t-4.5)/0.6,0,1);
  const opacity=1-fadeOut;
  if(t>5.5) return null;
  return(<div style={{
    position:'absolute',inset:0,
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    opacity,pointerEvents:'none',
  }}>
    {/* Gold eyebrow */}
    <div style={{
      fontFamily:MONO,fontSize:13,letterSpacing:'0.28em',color:GOLD,fontWeight:700,
      marginBottom:28,opacity:eyeP,transform:`translateY(${(1-eyeP)*10}px)`,
    }}>●  SIGNAL BOSS</div>

    {/* Main headline */}
    <div style={{
      fontFamily:UI,fontSize:72,fontWeight:800,color:'#fff',
      letterSpacing:'-0.03em',lineHeight:1.05,textAlign:'center',
      maxWidth:900,
      opacity:titleP,
      transform:`scale(${0.92+0.08*titleEase}) translateY(${(1-titleEase)*24}px)`,
    }}>
      4 Markets.<br/>8 Instruments.<br/>
      <span style={{color:GOLD}}>One Edge.</span>
    </div>

    {/* Sub */}
    <div style={{
      fontFamily:MONO,fontSize:16,color:MID,marginTop:32,
      letterSpacing:'0.08em',textAlign:'center',
      opacity:subP,transform:`translateY(${(1-subP)*10}px)`,
    }}>
      Two Years of Verified Performance
    </div>

    {/* Glow beneath headline */}
    <div style={{
      position:'absolute',top:'55%',left:'50%',
      transform:'translate(-50%,-50%)',
      width:600,height:200,
      background:`radial-gradient(ellipse, ${GOLD}14 0%, transparent 70%)`,
      pointerEvents:'none',
    }}/>
  </div>);
}

// Header that replaces the hero after transition
function Header(){
  const t=useTime();
  const fadeIn=clamp((t-5.0)/0.7,0,1);
  const ease=Easing.easeOutCubic(fadeIn);
  if(t<4.8) return null;
  return(<div style={{
    position:'absolute',top:52,left:72,
    opacity:ease,transform:`translateY(${(1-ease)*10}px)`,
  }}>
    <div style={{fontFamily:MONO,fontSize:13,letterSpacing:'0.24em',color:GOLD,fontWeight:700,marginBottom:10}}>BACKTEST RESULTS  ·  VERIFIED</div>
    <div style={{fontFamily:UI,fontSize:40,color:'#fff',fontWeight:800,letterSpacing:'-0.03em',lineHeight:1.1}}>4 Markets. 8 Instruments. One Edge.</div>
    <div style={{fontFamily:MONO,fontSize:15,color:MID,marginTop:10,letterSpacing:'0.06em'}}>Apr 2024 — Apr 2026  ·  500+ Trading Days  ·  8 Instruments</div>
  </div>);
}

function Chart(){
  const t=useTime();
  const start=5.8, end=9.3;
  const p=clamp((t-start)/(end-start),0,1);
  const opacity=clamp((t-start)/0.4,0,1);
  const len=1800;
  const dashOffset=len*(1-Easing.easeOutCubic(p));

  // Y-axis labels
  const yLabels=[
    {y:168,label:'+High'},
    {y:256,label:''},
    {y:348,label:'Start'},
  ];

  return(<div style={{
    position:'absolute',left:72,top:196,right:72,height:360,
    background:SURF,border:'1px solid #1a2e48',borderRadius:14,
    padding:'22px 28px 20px',opacity,
    boxShadow:'0 12px 48px rgba(0,0,0,0.6)',
  }}>
    <div style={{fontFamily:MONO,fontSize:12,letterSpacing:'0.18em',color:GOLD,fontWeight:700,marginBottom:10}}>EQUITY CURVE  ·  PORTFOLIO  ·  8 INSTRUMENTS</div>
    <svg viewBox="0 0 1200 400" style={{width:'100%',height:288,overflow:'visible'}}>
      <defs>
        <linearGradient id="fillGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={GREEN} stopOpacity="0.35"/>
          <stop offset="85%" stopColor={GREEN} stopOpacity="0.02"/>
        </linearGradient>
        <linearGradient id="lineGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stopColor={GREEN} stopOpacity="0.5"/>
          <stop offset="100%" stopColor={GREEN}/>
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[80,160,240,320,400].map(y=><line key={y} x1="0" y1={y} x2="1200" y2={y} stroke="#ffffff0b" strokeWidth="1"/>)}
      {/* Fill under curve */}
      {p>0.05 && <path d={`${PATH} L 1200 400 L 0 400 Z`} fill="url(#fillGrad)" opacity={Math.min(Easing.easeOutCubic(p)*1.1,0.9)} stroke="none"/>}
      {/* Line */}
      <path d={PATH} fill="none" stroke="url(#lineGrad)" strokeWidth="3.5" strokeDasharray={len} strokeDashoffset={dashOffset} strokeLinecap="round" strokeLinejoin="round"/>
      {/* Endpoint pulse */}
      {p>0.95 && <circle cx="1200" cy="168" r="6" fill={GREEN} opacity="0.9"><animate attributeName="r" values="5;9;5" dur="1.6s" repeatCount="indefinite"/></circle>}
    </svg>
  </div>);
}

function Stats(){
  const t=useTime();
  const stats=[
    {label:'AVG RISK : REWARD',val:'4 – 5 : 1',color:GOLD,start:9.5},
    {label:'WIN RATE (conservative)',val:'45%',color:'#fff',start:9.8},
    {label:'BREAK-EVEN WIN RATE',val:'~17%',color:GREEN,start:10.1},
    {label:'MAX PORTFOLIO DRAWDOWN',val:'< 1%',color:'#fff',start:10.4},
  ];
  return(<div style={{
    position:'absolute',left:72,right:72,bottom:52,
    display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:18,
  }}>
    {stats.map(s=>{
      const p=clamp((t-s.start)/0.4,0,1);
      const ease=Easing.easeOutBack(p);
      if(t<s.start-0.1) return <div key={s.label}/>;
      return(<div key={s.label} style={{
        opacity:p,
        transform:`translateY(${(1-ease)*22}px)`,
        background:'#080e1a',
        border:`1px solid ${s.color === GOLD ? '#c8a96e44' : s.color === GREEN ? '#00e5a033' : '#1a2e48'}`,
        borderRadius:12,
        padding:'20px 20px',
      }}>
        <div style={{fontFamily:MONO,fontSize:11,letterSpacing:'0.15em',color:MID,fontWeight:600,textTransform:'uppercase',marginBottom:10,lineHeight:1.4}}>{s.label}</div>
        <div style={{fontFamily:MONO,fontSize:s.val.length>6?30:38,fontWeight:700,color:s.color,letterSpacing:'-0.01em',lineHeight:1}}>{s.val}</div>
      </div>);
    })}
  </div>);
}

function CTA(){
  const t=useTime();
  const p=clamp((t-13.5)/0.7,0,1);
  const ease=Easing.easeOutCubic(p);
  if(t<13) return null;
  return(<div style={{
    position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
    pointerEvents:'none',opacity:ease,
  }}>
    <div style={{
      background:'rgba(5,8,16,0.85)',backdropFilter:'blur(4px)',
      border:'1px solid rgba(200,169,110,0.25)',borderRadius:20,
      padding:'36px 72px',textAlign:'center',
      transform:`scale(${0.94+0.06*ease}) translateY(${(1-ease)*18}px)`,
      boxShadow:'0 0 80px rgba(5,8,16,0.95)',
    }}>
      <div style={{fontFamily:MONO,fontSize:13,letterSpacing:'0.24em',color:GOLD,fontWeight:700,marginBottom:14}}>●  SIGNAL BOSS</div>
      <div style={{fontFamily:UI,fontSize:34,fontWeight:700,color:'#fff',letterSpacing:'-0.02em',marginBottom:16}}>4 Markets. 8 Instruments. One Edge.</div>
      <div style={{fontFamily:MONO,fontSize:15,color:GOLD,letterSpacing:'0.08em',opacity:0.85}}>signalboss.net</div>
    </div>
  </div>);
}

function Disclaimer(){
  const t=useTime();
  const p=clamp((t-14.5)/0.5,0,1);
  if(t<14) return null;
  return(<div style={{
    position:'absolute',bottom:14,left:0,right:0,textAlign:'center',
    opacity:p*0.65,fontFamily:MONO,fontSize:11,color:MID,
  }}>
    Past performance is not indicative of future results. All backtest data is simulated.
  </div>);
}

function Scene(){
  return(<div style={{position:'absolute',inset:0,background:BG}}>
    <Hero/>
    <Header/>
    <Chart/>
    <Stats/>
    <CTA/>
    <Disclaimer/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1280} height={720} duration={18} background={BG} persistKey="sb_backtest"><Scene/></Stage>
);
</script>
</body>
</html>
