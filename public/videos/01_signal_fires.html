<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Boss — Signal Fires (video)</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
  #root { position:fixed; inset:0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const GOLD='#c8a96e',LONG='#00e5a0',BG='#050810',SURF='#0f2019',TEXT='#eaeeee',MID='#b8cccc';
const MONO='IBM Plex Mono, monospace', UI='DM Sans, system-ui, sans-serif';

function Ticker(){
  const {time}=useTimeline();
  const items=['ES 7,119.25','NQ 26,672.50','CL 87.50','GC 4,808.40','RTY 2,761.40','/6E 1.0892','ZN 111\'12'];
  const all=[...items,...items,...items];
  const x=-(time*120)%900;
  return(<div style={{position:'absolute',top:0,left:0,right:0,height:56,background:'#000',borderBottom:`1px solid #1a2e48`,overflow:'hidden',display:'flex',alignItems:'center'}}>
    <div style={{position:'absolute',left:x,display:'flex',gap:48,whiteSpace:'nowrap',fontFamily:MONO,fontSize:22,color:'#fff',fontWeight:500,paddingLeft:40}}>
      {all.map((t,i)=><span key={i}><b style={{color:GOLD,marginRight:10}}>●</b>{t}</span>)}
    </div>
  </div>);
}

function SignalCard(){
  const t=useTime();
  // Card enters at 1s, settles ~1.6s
  const p=clamp((t-1)/0.6,0,1);
  const ease=Easing.easeOutBack(p);
  const opacity=clamp((t-1)/0.4,0,1);
  if(t<1) return null;

  // Number rollups — entry/stop/target count-up starting at 2.0, 2.4, 2.8
  const entryT=clamp((t-2.0)/0.5,0,1);
  const stopT=clamp((t-2.4)/0.5,0,1);
  const tgtT=clamp((t-2.8)/0.5,0,1);
  const entry=(7119.25*Easing.easeOutCubic(entryT)).toFixed(2);
  const stop=(7110.50*Easing.easeOutCubic(stopT)).toFixed(2);
  const target=(7146.00*Easing.easeOutCubic(tgtT)).toFixed(2);

  const glow=`0 0 ${40+Math.sin(t*2)*12}px #00e5a044, 0 0 ${90+Math.sin(t*2)*20}px #00e5a022`;

  return(<div style={{
    position:'absolute', top:180, left:'50%',
    transform:`translate(-50%,${(1-ease)*40}px) scale(${0.92+0.08*ease})`,
    opacity, width:720, background:SURF,
    border:`1.5px solid #00e5a0aa`, borderRadius:14,
    boxShadow:glow, overflow:'hidden', fontFamily:UI
  }}>
    <div style={{height:3,background:LONG}}/>
    <div style={{padding:'26px 32px 30px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:10,padding:'7px 16px',borderRadius:22,background:'#00e5a015',border:'1px solid #00e5a088',color:LONG,fontFamily:MONO,fontWeight:700,fontSize:16,letterSpacing:'0.12em'}}>
          <span style={{width:10,height:10,borderRadius:'50%',background:LONG,boxShadow:`0 0 10px ${LONG}`,opacity:0.6+0.4*Math.sin(t*4)}}/>LONG
        </span>
        <div>
          <span style={{fontFamily:MONO,fontWeight:700,fontSize:22,color:'#fff',letterSpacing:'0.04em'}}>ES DEC24</span>
          <span style={{fontFamily:MONO,fontSize:14,color:MID,marginLeft:12}}>09:34:12 ET</span>
        </div>
      </div>
      {[['🔵','Entry',entry],['🔴','Smart Stop',stop],['🟢','1st Target',target]].map(([ic,lbl,val],i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:'24px 1fr auto',gap:14,padding:'14px 0',borderBottom:i<2?'1px solid #ffffff12':'none',alignItems:'center'}}>
          <span style={{fontSize:16}}>{ic}</span>
          <span style={{fontFamily:MONO,fontSize:15,letterSpacing:'0.1em',textTransform:'uppercase',color:TEXT,fontWeight:600}}>{lbl}</span>
          <span style={{fontFamily:MONO,fontSize:24,fontWeight:700,color:'#fff'}}>{val}</span>
        </div>
      ))}
      <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid #ffffff12',display:'flex',justifyContent:'space-between',fontFamily:MONO,fontSize:14,color:TEXT}}>
        <span>R/R <b style={{color:GOLD,fontWeight:700}}>1 : 2.4</b></span>
        <span>3 confirming</span>
      </div>
    </div>
  </div>);
}

function Tagline(){
  const t=useTime();
  const p=clamp((t-4.5)/0.6,0,1);
  const ease=Easing.easeOutCubic(p);
  if(t<4.5) return null;
  return(<div style={{position:'absolute',bottom:60,left:0,right:0,textAlign:'center',opacity:ease,transform:`translateY(${(1-ease)*14}px)`,fontFamily:UI}}>
    <div style={{fontFamily:MONO,fontSize:15,letterSpacing:'0.22em',color:GOLD,fontWeight:700,marginBottom:12}}>●  SIGNAL BOSS</div>
    <div style={{fontSize:30,color:'#fff',fontWeight:700,letterSpacing:'-0.02em'}}>Follow the signal. Take the trade.</div>
  </div>);
}

function Scene(){
  return(<div style={{position:'absolute',inset:0,background:BG}}>
    <Ticker/>
    <SignalCard/>
    <Tagline/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1280} height={720} duration={7} background={BG} persistKey="sb_fires"><Scene/></Stage>
);
</script>
</body>
</html>
