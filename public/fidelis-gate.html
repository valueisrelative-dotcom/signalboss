<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelis Capital — Private Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #D4A843; --dark: #070706; --cream: #F5F2EB; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 400px; border: 1px solid rgba(212,168,67,0.2); padding: 48px 40px; position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; margin-bottom: 8px; }
    .subtitle { font-size: 13px; font-weight: 300; color: rgba(245,242,235,0.5); margin-bottom: 32px; }
    label { display: block; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(245,242,235,0.5); margin-bottom: 8px; }
    input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(245,242,235,0.15); color: var(--cream); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 300; padding: 13px 16px; outline: none; border-radius: 0; -webkit-appearance: none; }
    input:focus { border-color: rgba(212,168,67,0.4); }
    input::placeholder { color: rgba(245,242,235,0.2); }
    .btn { display: block; width: 100%; margin-top: 20px; padding: 14px; background: transparent; border: 1px solid rgba(212,168,67,0.4); color: var(--gold); font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn:hover:not(:disabled) { background: rgba(212,168,67,0.08); border-color: var(--gold); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .error { margin-top: 12px; font-size: 12px; color: #c0694a; }
    footer { margin-top: 28px; font-size: 10px; color: rgba(245,242,235,0.25); text-align: center; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Fidelis Capital</div>
    <h1>Private Access</h1>
    <p class="subtitle">By invitation only.</p>
    <form id="form" novalidate>
      <label for="password">Access Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="btn">Enter</button>
      <p class="error" id="error" hidden></p>
    </form>
  </div>
  <footer>Fidelis Capital &mdash; Private &amp; Confidential</footer>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const password = document.getElementById('password').value
      const btn = document.getElementById('btn')
      const error = document.getElementById('error')
      error.hidden = true
      btn.disabled = true
      btn.textContent = 'Verifying...'
      try {
        const res = await fetch('/api/fidelis-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        })
        const data = await res.json()
        if (res.ok) {
          window.location.href = '/'
        } else {
          error.textContent = data.error || 'Incorrect password.'
          error.hidden = false
        }
      } catch {
        error.textContent = 'Connection error. Please try again.'
        error.hidden = false
      } finally {
        btn.disabled = false
        btn.textContent = 'Enter'
      }
    })
  </script>
</body>
</html>
