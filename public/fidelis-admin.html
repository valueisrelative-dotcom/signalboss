<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelis — Access Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #1e1e1e; }
    header h1 { font-size: 18px; font-weight: 400; color: #D4A843; letter-spacing: 0.05em; }
    header p { font-size: 12px; color: #555; margin-top: 4px; }

    /* Auth gate */
    #auth-section { margin-bottom: 32px; }
    #auth-section p { font-size: 13px; color: #888; margin-bottom: 12px; }

    input {
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
      -webkit-appearance: none;
    }
    input:focus { border-color: #444; }
    input::placeholder { color: #3a3a3a; }

    #auth-key { width: 280px; margin-right: 8px; }
    #add-email-input { width: 280px; margin-right: 8px; }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-primary { background: #D4A843; color: #000; }
    .btn-danger { background: #6b2a2a; color: #e0e0e0; font-size: 11px; padding: 6px 12px; }

    #controls { display: none; }

    .add-row { display: flex; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }

    #status {
      font-size: 12px;
      color: #D4A843;
      min-height: 18px;
      margin-bottom: 16px;
    }
    #status.error { color: #c0694a; }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 12px;
    }

    #email-list { border-top: 1px solid #1e1e1e; }

    .email-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 14px;
      font-weight: 300;
    }

    .email-row span { color: #ccc; }

    .empty { font-size: 13px; color: #444; padding: 20px 0; font-style: italic; }
    .count { font-size: 11px; color: #555; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Fidelis Capital — Access Management</h1>
      <p>Manage the whitelist of approved visitors</p>
    </header>

    <div id="auth-section">
      <p>Enter your admin key to continue:</p>
      <div>
        <input type="password" id="auth-key" placeholder="Admin key">
        <button class="btn-primary" onclick="loadList()">Unlock</button>
      </div>
    </div>

    <div id="controls">
      <div class="add-row">
        <input type="email" id="add-email-input" placeholder="visitor@example.com">
        <button class="btn-primary" onclick="addEmail()">Add Email</button>
      </div>

      <div id="status"></div>

      <div class="section-label">Approved Visitors</div>
      <div id="count" class="count"></div>
      <div id="email-list"></div>
    </div>
  </div>

  <script>
    function getKey() {
      return document.getElementById('auth-key').value.trim()
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status')
      el.textContent = msg
      el.className = isError ? 'error' : ''
    }

    async function loadList() {
      const key = getKey()
      if (!key) { setStatus('Enter your admin key first.', true); return }

      setStatus('Loading...')

      try {
        const res = await fetch(`/api/fidelis-admin?token=${encodeURIComponent(key)}`)
        if (res.status === 403) { setStatus('Invalid admin key.', true); return }
        if (!res.ok) { setStatus('Error loading list.', true); return }

        const data = await res.json()
        document.getElementById('auth-section').style.display = 'none'
        document.getElementById('controls').style.display = 'block'
        setStatus('')
        renderList(data.emails || [])
      } catch {
        setStatus('Connection error. Try again.', true)
      }
    }

    function renderList(emails) {
      const list = document.getElementById('email-list')
      const count = document.getElementById('count')

      count.textContent = `${emails.length} approved email${emails.length !== 1 ? 's' : ''}`

      if (emails.length === 0) {
        list.innerHTML = '<p class="empty">No emails approved yet.</p>'
        return
      }

      list.innerHTML = emails.map(email => `
        <div class="email-row">
          <span>${escapeHtml(email)}</span>
          <button class="btn-danger" onclick="removeEmail('${escapeHtml(email)}')">Remove</button>
        </div>
      `).join('')
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    async function addEmail() {
      const email = document.getElementById('add-email-input').value.trim().toLowerCase()
      if (!email) return

      setStatus('Adding...')

      try {
        const res = await fetch('/api/fidelis-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getKey(), action: 'add', email }),
        })
        const data = await res.json()

        if (res.ok) {
          document.getElementById('add-email-input').value = ''
          setStatus(`Added: ${data.email}`)
          loadAndRender()
        } else {
          setStatus(data.error || 'Error adding email.', true)
        }
      } catch {
        setStatus('Connection error.', true)
      }
    }

    async function removeEmail(email) {
      if (!confirm(`Remove ${email} from the approved list?`)) return

      setStatus('Removing...')

      try {
        const res = await fetch('/api/fidelis-admin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getKey(), action: 'remove', email }),
        })
        const data = await res.json()

        if (res.ok) {
          setStatus(`Removed: ${data.email}`)
          loadAndRender()
        } else {
          setStatus(data.error || 'Error removing email.', true)
        }
      } catch {
        setStatus('Connection error.', true)
      }
    }

    async function loadAndRender() {
      try {
        const res = await fetch(`/api/fidelis-admin?token=${encodeURIComponent(getKey())}`)
        if (!res.ok) return
        const data = await res.json()
        renderList(data.emails || [])
      } catch {}
    }

    // Allow pressing Enter in the auth key field
    document.getElementById('auth-key').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadList()
    })
  </script>
</body>
</html>
